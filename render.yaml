services:
  - type: web
    name: fort-inform-site
    env: php
    buildCommand: "./render-build.sh"
    startCommand: "php artisan migrate --force && php artisan serve --host 0.0.0.0 --port $PORT"
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromService:
          type: psql
          name: fort-inform-db
          property: connectionString

databases:
  - name: fort-inform-db
    databaseName: fort_inform_db_z5pa
    user: fort_inform_admin
    plan: free
