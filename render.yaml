services:
  - type: web
    name: Fort Inform Site
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://fort-inform-site.onrender.com # Замените, если у вас другой домен
      - key: DB_CONNECTION
        value: pgsql
      - fromDatabase:
          name: Fort-Inform-Site-DB # Убедитесь, что имя совпадает с именем вашей БД на Render
          property: connectionString

    buildCommand: |
      composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
      npm install
      npm run build
      php artisan migrate --force

    startCommand: php artisan serve --host 0.0.0.0 --port 10000

databases:
  - name: Fort-Inform-Site-DB
    databaseName: fort_inform_site_db
    user: fort_inform_user
    plan: free
