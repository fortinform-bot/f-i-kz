services:
  # Основной веб-сервис для вашего приложения
  - type: web
    name: Fort Inform Site
    env: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false # Не синхронизировать с GitHub, чтобы не перезаписать значение
      - key: DATABASE_URL
        fromDatabase:
          name: Fort-Inform-Site-DB
          property: connectionString
      - key: DB_CONNECTION
        value: pgsql

  # Сервис для выполнения миграций при каждом развертывании
  - type: job
    name: Migrations
    plan: free
    startCommand: php artisan migrate --force
    envVars:
      - key: APP_KEY
        generateValue: true # Нужно, чтобы artisan работал
      - key: DATABASE_URL
        fromDatabase:
          name: Fort-Inform-Site-DB
          property: connectionString
      - key: DB_CONNECTION
        value: pgsql

databases:
  - name: Fort-Inform-Site-DB
    databaseName: fort_inform_site_db
    user: fort_inform_user
    plan: free
